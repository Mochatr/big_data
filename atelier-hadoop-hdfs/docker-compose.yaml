x-hadoop-env: &hadoop-env
  HADOOP_HOME: /opt/hadoop
  CORE-SITE.XML_fs.defaultFS: hdfs://namenode:8020
  HDFS-SITE.XML_dfs.namenode.rpc-address: namenode:8020
  HDFS-SITE.XML_dfs.replication: "3"
  HDFS-SITE.XML_dfs.blocksize: "134217728"
  HDFS-SITE.XML_dfs.webhdfs.enabled: "true"

services:
  namenode:
    image: apache/hadoop:3.4.3
    hostname: namenode
    command: ["/bin/bash", "-c", "hdfs namenode -format -nonInteractive || true; hdfs namenode"]
    ports:
      - "9870:9870"
      - "8020:8020"
    environment:
      <<: *hadoop-env
      ENSURE_NAMENODE_DIR: /tmp/hadoop-root/dfs/name
    volumes:
      - ./volumes/namenode:/data
  datanode1:
    image: apache/hadoop:3.4.3
    hostname: datanode1
    command: ["hdfs", "datanode"]
    environment:
      <<: *hadoop-env
  datanode2:
    image: apache/hadoop:3.4.3
    hostname: datanode2
    command: ["hdfs", "datanode"]
    environment:
      <<: *hadoop-env
  datanode3:
    image: apache/hadoop:3.4.3
    hostname: datanode3
    command: ["hdfs", "datanode"]
    environment:
      <<: *hadoop-env
  datanode4:
    image: apache/hadoop:3.4.3
    hostname: datanode4
    command: ["hdfs", "datanode"]
    environment:
      <<: *hadoop-env
  datanode5:
    image: apache/hadoop:3.4.3
    hostname: datanode5
    command: ["hdfs", "datanode"]
    environment:
      <<: *hadoop-env
